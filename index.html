<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>調教部屋</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #login-screen { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; width: 90%; max-width: 450px; text-align: center; }
        #login-screen input[type="text"] { width: 80%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
        #chat-screen { display: none; height: 100%; flex-direction: column; background: #fff; }
        .header-area { background: #f9f9f9; border-bottom: 1px solid #ddd; padding: 8px; flex-shrink: 0; z-index: 100; }
        .input-area { display: flex; gap: 5px; align-items: center; padding: 5px 0; }
        #message { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 5px; min-width: 0; }
        #to-user { padding: 9px 2px; border: 1px solid #ddd; border-radius: 5px; background: #fff; font-size: 12px; min-width: 60px; }
        #send-btn { padding: 10px 15px; background: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .info-bar { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #666; padding: 2px 5px; border-bottom: 1px solid #eee; }
        .footer-info { font-size: 10px; color: #999; margin-top: 10px; text-align: center; line-height: 1.6; }
        .footer-info a { color: #666; text-decoration: underline; }
        #chat-log { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 5px; background: #fff; -webkit-overflow-scrolling: touch; }
        
        .msg, .system-msg { display: flex; align-items: flex-start; padding: 6px 4px; border-bottom: 1px solid #f5f5f5; font-size: 14px; line-height: 1.4; width: 100%; box-sizing: border-box; }
        .msg-time { color: #aaa; font-size: 10px; width: 65px; min-width: 65px; margin-top: 2px; flex-shrink: 0; }
        .msg-content { flex-grow: 1; overflow-wrap: anywhere; }
        .system-msg { color: #888; background-color: #fcfcfc; }
        .private-msg { background-color: #fff5f5; }

        .punishment-msg { 
            background-color: #eeeeee !important; 
            padding: 10px 4px !important; 
            border-radius: 8px; 
            margin: 6px 0; 
            border: none !important; 
            display: flex !important; 
            align-items: flex-start !important; 
            white-space: pre-wrap;
        }
        .p-val-gyakuten { color: #0000ff; font-weight: bold; }
        .p-val-makikomi { color: #ff8c00; font-weight: bold; }
        .p-val-default { color: #ff0000; font-weight: bold; }

        .my-name-link { font-weight: bold; text-decoration: underline; cursor: pointer; }
        @keyframes flash-white { 0% { background-color: #fff; } 50% { background-color: #ccc; } 100% { background-color: #fff; } }
        .flash-active { animation: flash-white 0.3s ease-in-out 3; }
    </style>
</head>
<body>
    <audio id="sound-in" src="./sounds/in.mp3"></audio>
    <audio id="sound-out" src="./sounds/out.mp3"></audio>

    <div id="login-screen">
        <h2>調教部屋 入室</h2>
        <div id="pre-login-info" style="font-size:12px; margin-bottom:10px;">接続中...</div>
        <input type="text" id="login-name" placeholder="名前を入力">
        <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom: 15px;">
            <input type="color" id="user-color" value="#000000" style="width:40px; height:30px;"> 
            <span style="font-size:12px;">文字色</span>
        </div>

        <div style="margin-bottom: 20px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd; text-align: center;">
            <p style="font-size: 12px; margin: 0 0 8px 0; color: #555; font-weight: bold;">OS通知設定（ブラウザ単位）</p>
            <button type="button" onclick="subscribePush()" style="padding: 6px 12px; font-size: 11px; background: #3498db; color: white; border: none; border-radius: 3px; cursor: pointer;">🔔 登録</button>
            <button type="button" onclick="unsubscribePush()" style="padding: 6px 12px; font-size: 11px; background: #95a5a6; color: white; border: none; border-radius: 3px; cursor: pointer; margin-left: 5px;">🔕 解除</button>
        </div>

        <button id="enter-btn" style="width: 80%; padding: 12px; background: #333; color: white; border-radius:5px; border:none; font-weight:bold; cursor:pointer;">入室する</button>
        <div class="footer-info">
            <a href="https://sites.google.com/view/osiokimesu/" target="_blank">利用ルール・世界観</a><br>
            Sound by <a href="https://otologic.jp" target="_blank">OtoLogic(CC BY 4.0)</a>
        </div>
    </div>

    <div id="chat-screen">
        <div class="header-area">
            <div class="info-bar">
                <div id="user-list-display">参加者: 取得中...</div>
                <div style="display:flex; gap:5px; align-items:center;">
                    <select id="notify-mode" style="font-size: 10px;">
                        <option value="none">通知なし</option>
                        <option value="sound">音</option>
                        <option value="flash">フラッシュ</option>
                    </select>
                    <button id="leave-btn" style="background: #e74c3c; color: white; padding: 2px 8px; font-size: 10px; border-radius:3px; border:none; cursor:pointer;">退室</button>
                    </div>
            </div>
            <div class="input-area">
                <select id="to-user"><option value=""> </option></select>
                <input type="text" id="message" placeholder="メッセージ / 罰 / 2d6">
                <button id="send-btn">送信</button>
            </div>
            <div class="footer-info" style="text-align: right; margin-top: 2px; font-size: 9px;">
                <a href="https://sites.google.com/view/osiokimesu/" target="_blank">ルール</a> | <a href="https://otologic.jp" target="_blank">OtoLogic</a>
            </div>
        </div>
        <div id="chat-log"></div>
        <input type="color" id="user-color-dynamic" style="display:none;">
    </div>

    <script>
        const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.protocol === "file:";
        const PROD_URL = 'https://epintmtwdilimfwehyvz.supabase.co';
        const PROD_KEY = 'sb_publishable_CLHyNE7FTMfV4oTHJwVj0g_YGkoe_la';
        const DEV_URL = 'https://nvsswogjjongploglhnh.supabase.co';
        const DEV_KEY = 'sb_publishable_plfAfUuEJXQyifeeGoMzsg_jSJl-XCJ';
        
        let targetUrl = PROD_URL;
        let targetKey = PROD_KEY;
        if (isLocal) {
            targetUrl = DEV_URL;
            targetKey = DEV_KEY;
        }

        // リアルタイム接続の最適化（ネスト構造を維持）
        const client = supabase.createClient(targetUrl, targetKey, {
            realtime: {
                params: {
                    eventsPerSecond: 10,
                },
            },
        });

        let myName = ""; 
        let myColor = "#000000"; 
        let lastActivity = Date.now(); 
        let mainChannel; 
        let isEntered = false; 
        let isPendingEntry = false;
        let myIP = ""; 
        const myUA = navigator.userAgent;
        const myTabId = crypto.randomUUID(); // タブ識別用ID

        const audioIn = document.getElementById('sound-in');
        const audioOut = document.getElementById('sound-out');

        function maskIP(ip) {
            if (!ip || ip === "unknown") {
                return "unknown";
            }
            const parts = ip.split('.');
            if (parts.length === 4) {
                return parts[0] + "." + parts[1] + ".***." + parts[3];
            }
            return ip;
        }

        function parseUA(ua) {
            let os = "OS不明"; 
            let br = "Browser不明";
            if (ua.includes("Win")) {
                os = "Windows";
            } else if (ua.includes("Android")) {
                os = "Android";
            } else if (ua.includes("iPhone") || ua.includes("iPad")) {
                os = "iOS";
            } else if (ua.includes("Mac")) {
                os = "Mac";
            }

            if (ua.includes("Edge") || ua.includes("Edg")) {
                br = "Edge";
            } else if (ua.includes("Chrome")) {
                br = "Chrome";
            } else if (ua.includes("Safari")) {
                br = "Safari";
            } else if (ua.includes("Firefox")) {
                br = "Firefox";
            }
            
            return os + " / " + br;
        }

        window.onload = function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(function() {
                    console.log('Service Worker Registered');
                });
            }

            const savedName = localStorage.getItem('chat_user_name');
            if (savedName) { 
                document.getElementById('login-name').value = savedName; 
            }
            
            const savedColor = localStorage.getItem('chat_user_color');
            if (savedColor) {
                myColor = savedColor;
                document.getElementById('user-color').value = myColor;
                document.getElementById('user-color-dynamic').value = myColor;
            }

            const savedNotify = localStorage.getItem('chat_notify_mode');
            if (savedNotify) {
                document.getElementById('notify-mode').value = savedNotify;
            } else {
                document.getElementById('notify-mode').value = "none";
            }

            document.getElementById('enter-btn').onclick = enterChat;
            document.getElementById('send-btn').onclick = handleSend;
            document.getElementById('leave-btn').onclick = function() { leaveChat(false); };
            
            document.getElementById('notify-mode').onchange = function(e) { 
                localStorage.setItem('chat_notify_mode', e.target.value); 
            };
            
            document.getElementById('user-color-dynamic').onchange = function(e) {
                myColor = e.target.value;
                localStorage.setItem('chat_user_color', myColor);
                const link = document.querySelector('.my-name-link');
                if (link) { 
                    link.style.color = myColor; 
                }
            };
            setupChannel();
        };

        function setupChannel() {
            // PresenceのキーにmyTabIdを使用して、複数タブを許容する
            mainChannel = client.channel('room-1', {
                config: {
                    presence: {
                        key: myTabId,
                    },
                },
            });
            mainChannel
                .on('presence', { event: 'sync' }, async function() {
                    const state = mainChannel.presenceState();
                    
                    const users = Object.values(state).flat();
                    const uniqueNames = new Set(users.map(function(u) { return u.user_name; }).filter(Boolean));
                    const count = uniqueNames.size;
                    
                    document.getElementById('pre-login-info').textContent = "現在の入室者: " + count + "名";
                    updateUserList(state);
                    if (isPendingEntry && !isEntered) { 
                        completeEntry(); 
                    }
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, function(payload) {
                    if (isEntered) { 
                        displayMessage(payload.new, true); 
                    }
                })
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, function() {
                    if (isEntered) { 
                        document.getElementById('chat-log').innerHTML = ""; 
                    }
                })
                .subscribe(async function(status) {
                    if (status === 'SUBSCRIBED' && isEntered) {
                        await mainChannel.track({ 
                            user_name: myName, 
                            tab_id: myTabId, 
                            online_at: new Date().toISOString() 
                        });
                    }
                });
        }

		async function enterChat() {
	        const nameInput = document.getElementById('login-name').value.trim();
	        if (!nameInput) {
	            alert("名前を入力してください");
	            return;
	        }
	
	        // 1. IPアドレスの取得
	        try {
	            const res = await fetch('https://api.ipify.org?format=json');
	            const data = await res.json();
	            // 型の揺れを防ぐため文字列として正規化
	            myIP = String(data.ip || "unknown").trim();
	        } catch (e) {
	            myIP = "unknown";
	        }
	
	        // 2. 現在のユーザーリスト（Presence）取得
	        const state = mainChannel.presenceState();
	        const allUsers = Object.values(state).flat();
	
	        // 3. 重複・なりすましチェック
	        const isOtherPerson = allUsers.some(function(u) {
	            // 名前が違えば、そもそも判定対象（他人）ではない
	            if (u.user_name !== nameInput) {
	                return false;
	            }
	
	            // --- ここから「名前が一致したユーザー」の精査 ---
	            
	            // DB側のIPを文字列として正規化
	            const savedIP = String(u.ip || "").trim();
	
	            // 以下のいずれかに該当すれば「自分自身のセッション（または残像）」とみなす
	            const isMe = (
	                savedIP === "" ||           // IPが未登録
	                savedIP === "undefined" ||  // 以前のバグでundefinedが書き込まれた残像
	                savedIP === myIP ||         // IPが完全に一致
	                u.tab_id === myTabId        // タブIDが一致（同一セッション）
	            );
	
	            // 「自分ではない」＝「なりすまし（他人）」がいる場合に true を返す
	            if (!isMe) {
	                return true;
	            } else {
	                return false;
	            }
	        });
	
	        if (isOtherPerson) {
	            alert("その名前は既に使用されています");
	            return;
	        }
	
	        // --- 以降、入室確定処理 ---
	        document.getElementById('enter-btn').disabled = true;
	        
	        myName = nameInput;
	        myColor = document.getElementById('user-color').value;
	        
	        localStorage.setItem('chat_user_name', myName);
	        localStorage.setItem('chat_user_color', myColor);
	
	        isPendingEntry = true;
	
	        // Presenceに自身の情報を登録（ここで確実にmyIPを渡す）
	        await mainChannel.track({
	            user_name: myName,
	            tab_id: myTabId,
	            ip: myIP,
	            online_at: new Date().toISOString()
	        });
	
	        // 入室完了待機
	        setTimeout(function() {
	            if (!isEntered) {
	                completeEntry();
	            }
	        }, 2000);
        }


        async function completeEntry() {
            isEntered = true;
            lastActivity = Date.now();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            const state = mainChannel.presenceState();
            const allUsers = Object.values(state).flat();
            
            // 同一ユーザーの別タブがいるか確認
            const otherTabsOfMe = allUsers.filter(function(u) {
                return u.user_name === myName && u.tab_id !== myTabId;
            });

            // 全体で最初の一人（自分だけ）ならログを掃除
            if (allUsers.length <= 1) {
                await client.from('messages').delete().neq('id', 0);
                document.getElementById('chat-log').innerHTML = "";
            } else { 
                await loadPastMessages(); 
            }
            
            // 自分の別タブが存在しない（＝この名前で最初の入室）場合のみ入室メッセージを送信
            if (otherTabsOfMe.length === 0) {
                const envDisplay = "(" + parseUA(myUA) + " / " + maskIP(myIP) + ")";
                await sendSystemMessage(myName + "さんが入室しました" + envDisplay);
            }
            
            document.getElementById('message').onkeypress = function(e) { 
                if (e.key === 'Enter') { 
                    handleSend(); 
                } 
            };

            // 生存確認
            setInterval(async function() {
                if (isEntered && mainChannel) {
                    await mainChannel.track({ 
                        user_name: myName, 
                        tab_id: myTabId,
                        online_at: new Date().toISOString(),
                        hb: Date.now() 
                    });
                }
            }, 30000);

            setInterval(checkInactivity, 60000);
        }

        async function loadPastMessages() {
            const response = await client.from('messages')
                .select('*')
                .or('to_user.is.null,username.eq.PUNISHMENT,content.ilike.%🎲%,username.eq.SYSTEM')
                .order('id', { ascending: true }) 
                .limit(50);
            
            const log = document.getElementById('chat-log');
            log.innerHTML = "";
            if (response.data) { 
                response.data.forEach(function(msg) { 
                    displayMessage(msg, false); 
                }); 
            }
        }

        async function handleSend() {
            lastActivity = Date.now();
            const messageEl = document.getElementById('message');
            const toUser = document.getElementById('to-user').value;
            const content = messageEl.value.trim();
            if (!content) { 
                return; 
            }

            let finalContent = content; 
            let finalUsername = myName; 
            let finalToUser = null;
            if (toUser) { 
                finalToUser = toUser; 
            }

            if (!toUser) {
                if (content === "オールクリア") {
                    await client.from('messages').delete().neq('id', 0);
                    await sendSystemMessage(myName + "さんによってオールクリアされました");
                    messageEl.value = ''; 
                    return;
                }
                const diceMatch = content.match(/^(\d+)d(\d+)(?:\+(\d+))?$/i);
                if (diceMatch) {
                    const num = Math.min(parseInt(diceMatch[1]), 100); 
                    const sides = Math.min(parseInt(diceMatch[2]), 100); 
                    const plus = parseInt(diceMatch[3] || 0);
                    let rolls = []; 
                    let total = 0;
                    for(let i=0; i<num; i++) { 
                        const r = Math.floor(Math.random() * sides) + 1; 
                        rolls.push(r); 
                        total += r; 
                    }
                    total += plus; 
                    let diceStr = rolls.join('+');
                    if (plus > 0) { 
                        diceStr += "+" + plus; 
                    }
                    finalContent = "🎲 " + content + "：(" + diceStr + ") = 【" + total + "】";
                }
                if (content === "罰") {
                    const response = await client.from('punishments').select('*');
                    if (response.data && response.data.length > 0) {
                        const p = response.data[Math.floor(Math.random() * response.data.length)];
                        finalUsername = "PUNISHMENT";
                        
                        let valClass = "p-val-default";
                        if (p.type.includes("逆転")) {
                            valClass = "p-val-gyakuten";
                        } else if (p.type.includes("巻込")) {
                            valClass = "p-val-makikomi";
                        }
                        
                        finalContent = "◆ジャンル\n<span class=\"" + valClass + "\">" + p.type + "</span>\n" +
                                       "◆初回\n" + p.first_time + "\n" +
                                       "◆初回条件を満たしている場合\n" + p.second_time + "\n" +
                                       "◆パス／逝き奴隷／巻込奴隷\n" + p.pass_status + " ／ " + p.iki_slave + " ／ " + p.maki_slave;
                    }
                }
            }
            await client.from('messages').insert([{ 
                username: finalUsername, 
                content: finalContent, 
                color: myColor, 
                to_user: finalToUser, 
                ip_address: myIP, 
                user_agent: myUA 
            }]);
            messageEl.value = '';
        }

        function displayMessage(msg, isNew) {
            const log = document.getElementById('chat-log');
            const isIM = (msg.to_user === "@ALL_PRIVATE");
            
            if (msg.to_user && msg.to_user !== myName && msg.username !== myName && !isIM) { 
                return; 
            }

            const div = document.createElement('div');
            let d = new Date();
            if (msg.created_at) { 
                d = new Date(msg.created_at); 
            }
            const timeStr = String(d.getHours()).padStart(2, '0') + ":" + 
                            String(d.getMinutes()).padStart(2, '0') + ":" + 
                            String(d.getSeconds()).padStart(2, '0');
            
            if (msg.username === 'SYSTEM') {
                div.className = 'system-msg';
                div.innerHTML = "<span class=\"msg-time\">" + timeStr + "</span><div class=\"msg-content\">" + msg.content + "</div>";
                if (isNew && !msg.content.includes(myName)) {
                    if (msg.content.includes("入室しました")) { 
                        playNotify(log, 'in'); 
                    }
                    if (msg.content.includes("退室しました")) { 
                        playNotify(log, 'out'); 
                    }
                }
            } else if (msg.username === 'PUNISHMENT') {
                div.className = 'msg punishment-msg';
                div.innerHTML = "<span class=\"msg-time\">" + timeStr + "</span><div class=\"msg-content\">" + msg.content + "</div>";
            } else {
                div.className = 'msg';
                if (msg.to_user) { 
                    div.classList.add('private-msg'); 
                }
                let toLabel = "";
                if (isIM) { 
                    toLabel = "<span style=\"color:red;\">[全員へ私信]</span> "; 
                } else if (msg.to_user) { 
                    toLabel = "<span style=\"color:red;\">[" + msg.to_user + "へ]</span> "; 
                }
                div.innerHTML = "<span class=\"msg-time\">" + timeStr + "</span><div class=\"msg-content\"><strong style=\"color:" + msg.color + "\">" + msg.username + "</strong>: " + toLabel + msg.content + "</div>";
            }

            log.prepend(div); 
        }

        function playNotify(logEl, type) {
            const mode = document.getElementById('notify-mode').value;
            if (mode === 'sound') {
                if (type === 'in') { 
                    audioIn.play().catch(function(){}); 
                }
                if (type === 'out') { 
                    audioOut.play().catch(function(){}); 
                }
            }
            if (mode === 'flash') {
                logEl.classList.add('flash-active');
                setTimeout(function() { 
                    logEl.classList.remove('flash-active'); 
                }, 1000);
            }
        }

        function updateUserList(state) {
            const select = document.getElementById('to-user'); 
            const display = document.getElementById('user-list-display');
            const users = Object.values(state).flat().filter(function(u) { 
                return u.user_name; 
            });
            const names = Array.from(new Set(users.map(function(u) { return u.user_name; }))).sort();
            
            display.innerHTML = "参加者(" + names.length + "): ";
            names.forEach(function(n, idx) {
                const span = document.createElement('span');
                if (n === myName) { 
                    span.className = 'my-name-link'; 
                    span.style.color = myColor; 
                    span.textContent = n; 
                    span.onclick = function() { 
                        document.getElementById('user-color-dynamic').click(); 
                    }; 
                } else { 
                    span.textContent = n; 
                }
                display.appendChild(span); 
                if (idx < names.length - 1) { 
                    display.appendChild(document.createTextNode(', ')); 
                }
            });

            const currentTo = select.value;
            select.innerHTML = '<option value=""> </option>';
            names.forEach(function(n) { 
                if (n !== myName) { 
                    const o = document.createElement('option'); 
                    o.value = n; 
                    o.textContent = n; 
                    select.appendChild(o); 
                } 
            });
            select.innerHTML += '<option value="@ALL_PRIVATE">IM</option>'; 
            select.value = currentTo;
        }

        async function sendSystemMessage(text) { 
            return await client.from('messages').insert([{ 
                username: 'SYSTEM', 
                content: text, 
                color: '#888888', 
                ip_address: myIP, 
                user_agent: myUA 
            }]); 
        }
        
        async function leaveChat(isAuto) { 
            if (!isAuto) { 
                if (!confirm("退室しますか？")) { 
                    return; 
                } 
            }
            
            const state = mainChannel.presenceState();
            const allUsers = Object.values(state).flat();
            // 自分と同じ名前の他タブが残っているか確認
            const otherTabsOfMe = allUsers.filter(function(u) {
                return u.user_name === myName && u.tab_id !== myTabId;
            });

            // 最後のタブを閉じる時だけ退室ログを流す
            if (otherTabsOfMe.length === 0) {
                let suffix = "";
                if (isAuto) { 
                    suffix = "（タイムアウト）"; 
                }
                await sendSystemMessage(myName + "さんが退室しました" + suffix); 
            }

            if (mainChannel) {
                await mainChannel.untrack();
            }
            setTimeout(function() { 
                location.reload(); 
            }, 300); 
        }

        function checkInactivity() { 
            if (isEntered) {
                const now = Date.now();
                if (now - lastActivity > 20 * 60 * 1000) {
                    leaveChat(true);
                }
            }
        }

        window.addEventListener('beforeunload', function() {
            if (isEntered && mainChannel) {
                mainChannel.untrack();
            }
        });

        const VAPID_PUBLIC_KEY = 'BG6BmliA7Ch7aEaX9IhoVtsfsm4trfi9tszwu-pcy-G4a3fsqPwmx_IUnrygepPO86aE1FOyp5z2jR8iCbR6y_U';

        const urlBase64ToUint8Array = function(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            return Uint8Array.from([...rawData].map(function(char) { 
                return char.charCodeAt(0); 
            }));
        };

        async function subscribePush() {
            try {
                const registration = await navigator.serviceWorker.ready;
                const sub = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });

                const { error } = await client
                    .from('push_subscriptions')
                    .upsert({
                        subscription: sub,
                        user_name: 'GUEST'
                    }, { 
                        onConflict: 'subscription' 
                    });

                if (error) {
                    throw error;
                }
                alert('OS通知を登録しました！');
            } catch (err) {
                console.error('Push failed:', err);
                alert('登録失敗。ブラウザの通知権限を確認してください。');
            }
        }

        async function unsubscribePush() {
            try {
                const registration = await navigator.serviceWorker.ready;
                const sub = await registration.pushManager.getSubscription();
                
                if (sub) {
                    const { error } = await client
                        .from('push_subscriptions')
                        .delete()
                        .eq('subscription->>endpoint', sub.endpoint);
                    
                    if (error) {
                        throw error;
                    }
                    await sub.unsubscribe();
                }
                alert('OS通知を解除しました。');
            } catch (err) {
                console.error('Unsubscribe failed:', err);
                alert('解除に失敗しました。');
            }
        }

    </script>
</body>
